apply plugin: 'com.android.application'

android {
    namespace = "uk.eugnel.ks2spelling"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "uk.eugnel.ks2spelling"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        buildConfigField "String", "B3_TESTED_APPLICATION_COMMIT", '""'
        buildConfigField "String", "B3_APPLICATION_FINGERPRINT", '""'
        buildConfigField "boolean", "B3_SANDBOX_PROOF", "false"
        buildConfigField "String", "B3_MODE", '""'
        buildConfigField "String", "B3_PROOF_KIND", '""'
        buildConfigField "String", "B3_PLATFORM", '""'
        buildConfigField "String", "B3_DISTRIBUTION", '""'
        buildConfigField "String", "B3_PUBLIC_SANDBOX_ORIGIN", '""'
        buildConfigField "String", "B3_WORKER_NAME", '""'
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildFeatures {
        buildConfig = true
    }
    if (project.hasProperty("b3Distribution")) {
        flavorDimensions += "proof"
        productFlavors {
            b3SandboxProof {
                dimension "proof"
                versionName "0.3.0-b3"
                versionCode Integer.parseInt(project.property("b3AndroidVersionCode").toString())
                buildConfigField "String", "B3_TESTED_APPLICATION_COMMIT", "\"${project.property('b3TestedApplicationCommit')}\""
                buildConfigField "String", "B3_APPLICATION_FINGERPRINT", "\"${project.property('b3ApplicationFingerprint')}\""
                buildConfigField "boolean", "B3_SANDBOX_PROOF", "true"
                buildConfigField "String", "B3_MODE", '"B3SandboxProof"'
                buildConfigField "String", "B3_PROOF_KIND", '"physical-live"'
                buildConfigField "String", "B3_PLATFORM", '"android"'
                buildConfigField "String", "B3_DISTRIBUTION", '"play-internal"'
                buildConfigField "String", "B3_PUBLIC_SANDBOX_ORIGIN", '"https://b3-gateway.eugnel.uk"'
                buildConfigField "String", "B3_WORKER_NAME", '"ks2-spelling-b3-sandbox"'
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.biometric:biometric:1.1.0"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "com.android.billingclient:billing:9.1.0"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    androidTestImplementation "androidx.test.uiautomator:uiautomator:2.4.0"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
