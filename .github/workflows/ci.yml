name: B2 continuous integration

on:
  pull_request:
  push:
    branches:
      - main
      - jamesto/mobile-b2-persistence
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: b2-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  domain-web:
    name: Domain and web
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install exact JavaScript dependencies
        run: npm ci
      - name: Verify frozen spelling authority and A3 producer contracts
        run: |
          npm run verify:vendor
          npm run test:upstream:a3
      - name: Run B2 SQLite, atomicity and lifecycle contracts
        run: |
          node --test \
            tests/sql-connection-contract.test.mjs \
            tests/canonical-json.test.mjs \
            tests/capacitor-sqlite-connection.test.mjs \
            tests/sqlite-schema.test.mjs \
            tests/sqlite-migration-rollback.test.mjs \
            tests/database-command-gate.test.mjs \
            tests/sqlite-spelling-snapshot-store.test.mjs \
            tests/sqlite-command-repository.test.mjs \
            tests/sqlite-adapter-parity.test.mjs \
            tests/sqlite-atomicity.test.mjs \
            tests/sqlite-multi-learner.test.mjs \
            tests/app-lifecycle-contract.test.mjs \
            tests/database-lifecycle-coordinator.test.mjs \
            tests/b2-proof-controller.test.mjs
      - name: Run complete default suite without fresh Android resolution
        run: npm run test:default:no-android-resolution
      - name: Lint source and verification code
        run: npm run lint
      - name: Build bundled web application
        run: npm run build
      - name: Materialise and verify fingerprinted native bundle inputs
        run: npm run native:sync:check
      - name: Validate committed B2 virtual-device evidence
        run: node scripts/build-b2-exit-report.mjs --check

  android-compile:
    name: Android unsigned debug and release compile
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Set up Temurin 21 for CI only
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up committed Gradle wrapper
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          validate-wrappers: true
      - name: Require Android API and Build Tools 36
        run: |
          test -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          test -x "$ANDROID_HOME/platform-tools/adb"
          test -x "$ANDROID_HOME/build-tools/36.0.0/aapt2"
          test -f "$ANDROID_HOME/platforms/android-36/android.jar"
      - name: Install exact JavaScript dependencies
        run: npm ci
      - name: Materialise and verify synced native bundle inputs
        run: npm run native:sync:check
      - name: Compile and test Android debug plus unsigned release application
        run: npm run test:android
      - name: Certify resolved Android dependency closure
        run: npm run certify:android
      - name: Run fresh resolved Android dependency policy tests
        run: npm run test:android-resolved-policy
      - name: Validate committed B2 virtual-device evidence
        run: node scripts/build-b2-exit-report.mjs --check

  ios-compile:
    name: iOS unsigned Simulator compile
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Require Xcode 26 or newer
        run: |
          xcodebuild -version
          xcode_major="$(xcodebuild -version | awk '/^Xcode / { split($2, version, "."); print version[1] }')"
          test -n "$xcode_major"
          test "$xcode_major" -ge 26
      - name: Install exact JavaScript dependencies
        run: npm ci
      - name: Materialise and verify synced native bundle inputs
        run: npm run native:sync:check
      - name: Compile unsigned iOS Simulator application
        run: npm run test:ios
      - name: Validate committed B2 virtual-device evidence
        run: node scripts/build-b2-exit-report.mjs --check
