name: B4 milestone certification

on:
  push:
    tags:
      - "cert-*"

permissions:
  contents: read

concurrency:
  group: b4-certify-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify the exact milestone candidate
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    with:
      certification: true

  bundle:
    name: Derive the frozen evidence bundle
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out the exact certified tag target
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
      - name: Download the exact builds produced by the heavy gate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: certification-*
          path: .native-build/certification-inputs
          merge-multiple: true
      # Fresh proof capture remains an explicit pre-tag milestone activity. This
      # job runs only after the reusable three-lane heavy gate has validated the
      # committed reports, native compiles and frozen authorities at this SHA.
      - name: Derive the deterministic source and evidence manifest
        run: >-
          node scripts/build-certification-bundle.mjs --builds-directory ".native-build/certification-inputs" --output-directory ".native-build/certification/$GITHUB_REF_NAME"
      - name: Upload the immutable milestone bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ks2-spelling-${{ github.ref_name }}-${{ github.sha }}
          path: .native-build/certification/${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 90
