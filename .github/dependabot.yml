version: 2

# Dependabot proposes reviewable updates only. This repository does not auto-merge them.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - manual-review
    commit-message:
      prefix: deps

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: "06:15"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - native-dependency-review
      - manual-review
    commit-message:
      prefix: deps(android)

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - manual-review
    commit-message:
      prefix: deps(actions)
