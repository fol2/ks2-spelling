name: B4 continuous integration

on:
  pull_request:
  push:
    branches:
      - main
      - jamesto/mobile-b3-billing-download
      - jamesto/mobile-b4-vertical-slice
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: b4-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  domain-web:
    name: Domain and web
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install exact root and gateway dependencies
        run: |
          npm ci
          npm --prefix gateway ci
      - name: Verify frozen B2, vendored and A3 authorities
        run: |
          npm run verify:b2-authority
          npm run verify:vendor
          npm run test:upstream:a3
      - name: Materialise deterministic proof-pack and native bundle inputs
        run: |
          npm run build:b3-proof-pack
          npm run native:sync:check
      - name: Run host-neutral domain and web suite
        run: >-
          node --test
          --test-skip-pattern='^(?:B3 native audit is rebuilt from closed fresh inputs without weakening B2|compiled owned Swift inspector accepts the proof pack and rejects the full hostile corpus)$'
          tests/*.test.mjs
      - name: Run real gateway contracts and dry-run
        run: |
          npm --prefix gateway test
          npm --prefix gateway run lint
          npm --prefix gateway run deploy:dry-run
          npm --prefix gateway audit --audit-level=high
      - name: Regenerate deterministic B3 proof
        run: npm run prove:b3:deterministic
      - name: Lint source and verification code
        run: npm run lint
      - name: Build bundled web application
        run: npm run build
      - name: Build the offline B4 web application and verify committed evidence
        run: |
          npm run build:b4-development
          npm run report:b4-development:check
      - name: Prove the branch candidate is one evidence-only successor
        if: github.ref != 'refs/heads/main'
        run: |
          checkpoint="$(node -e "const fs=require('node:fs'); process.stdout.write(JSON.parse(fs.readFileSync('reports/b4/b4-development-report.json')).applicationCheckpoint.commit)")"
          test "$(git rev-parse HEAD^)" = "$checkpoint"
          node --input-type=module -e "import { B4_EVIDENCE_PATHS } from './scripts/collect-b4-development-evidence.mjs'; process.stdout.write(B4_EVIDENCE_PATHS.toSorted().join('\\n') + '\\n')" > /tmp/b4-expected-paths
          git diff --name-only "$checkpoint"..HEAD > /tmp/b4-actual-paths
          test -s /tmp/b4-actual-paths
          grep -qx "reports/b4/b4-development-report.json" /tmp/b4-actual-paths
          test -z "$(comm -13 /tmp/b4-expected-paths <(sort /tmp/b4-actual-paths))"
      - name: Validate B3 pending or complete evidence topology
        run: node scripts/build-b3-exit-report.mjs --check-ci

  android-compile:
    name: Android unsigned debug and release compile
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Set up Temurin 21 for CI only
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up committed Gradle wrapper
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          validate-wrappers: true
      - name: Require Android API and Build Tools 36
        run: |
          test -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          test -x "$ANDROID_HOME/platform-tools/adb"
          test -x "$ANDROID_HOME/build-tools/36.0.0/aapt2"
          test -f "$ANDROID_HOME/platforms/android-36/android.jar"
      - name: Install exact JavaScript dependencies
        run: npm ci
      - name: Materialise and verify synced native bundle inputs
        run: npm run native:sync:check
      - name: Compile and test Android debug plus unsigned release application
        run: npm run test:android
      - name: Compile the installed B4 Android test seam
        run: |
          npm run sync:b4-development
          ./android/gradlew -p android :app:assembleDebug :app:assembleDebugAndroidTest --no-daemon
          npm run report:b4-development:check
      - name: Test and compile the unsigned B3 application
        working-directory: android
        run: >-
          ./gradlew test bundleB3SandboxProofRelease
          -Pb3Distribution=1
          -Pb3AndroidVersionCode=1
          -Pb3TestedApplicationCommit=1111111111111111111111111111111111111111
          -Pb3ApplicationFingerprint=2222222222222222222222222222222222222222222222222222222222222222
          --no-daemon
      - name: Certify resolved Android dependency closure
        run: npm run certify:android
      - name: Run fresh resolved Android dependency policy tests
        run: npm run test:android-resolved-policy
      - name: Validate B3 pending or complete evidence topology
        run: node scripts/build-b3-exit-report.mjs --check-ci

  ios-compile:
    name: iOS unsigned Simulator compile
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Validate B3 pending or complete evidence topology
        run: node scripts/build-b3-exit-report.mjs --check-ci
      - name: Require Xcode 26 or newer
        run: |
          xcodebuild -version
          xcode_major="$(xcodebuild -version | awk '/^Xcode / { split($2, version, "."); print version[1] }')"
          test -n "$xcode_major"
          test "$xcode_major" -ge 26
      - name: Install exact JavaScript dependencies
        run: npm ci
      - name: Materialise and verify synced native bundle inputs
        run: npm run native:sync:check
      - name: Compile unsigned iOS Simulator application
        run: npm run test:ios
      - name: Compile the installed B4 iOS test seam and verify committed evidence
        run: |
          npm run sync:b4-development
          xcodebuild \
            -quiet \
            -project ios/App/App.xcodeproj \
            -scheme B4DevelopmentUITests \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .native-build/b4-ci \
            CODE_SIGNING_ALLOWED=NO \
            build-for-testing
          npm run report:b4-development:check
      - name: Compile unsigned B3 iOS Simulator application
        run: >-
          xcodebuild
          -project ios/App/App.xcodeproj
          -scheme B3SandboxProof
          -configuration B3SandboxProof
          -sdk iphonesimulator
          CODE_SIGNING_ALLOWED=NO
          B3_TESTED_APPLICATION_COMMIT=1111111111111111111111111111111111111111
          B3_APPLICATION_FINGERPRINT=2222222222222222222222222222222222222222222222222222222222222222
          B3_VERSION_NAME=0.3.0-b3
          B3_IOS_BUILD_NUMBER=1
          build
      - name: Run owned hostile iOS pack inspector
        run: node scripts/test-ios-pack-inspector.mjs
      - name: Run non-live iOS StoreKit Test
        run: npm run prove:b3:ios-storekit-test
